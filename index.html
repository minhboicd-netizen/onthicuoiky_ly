    // ================= LOGIC ĐIỀU HƯỚNG VÀ XỬ LÝ =================
    let queue = [];
    let totalQuestions = 0;
    let stats = { wrong: 0 };
    let currentQ = null;
    let feedbackMode = false;
    let isCurrentCorrect = false;

    let userMcqAns = null;
    let userTfAns = [];
    let userShortAns = "";

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function initApp() {
      let initialQueue = examData.map(q => q.id);
      queue = shuffleArray(initialQueue);
      totalQuestions = examData.length;
      stats.wrong = 0;
      loadNextQuestion();
    }

    function loadNextQuestion() {
      if (queue.length === 0) { renderFinishScreen(); return; }
      const currentId = queue[0];
      currentQ = examData.find(q => q.id === currentId);
      feedbackMode = false;
      userMcqAns = null;
      userTfAns = currentQ.type === 'true_false' ? new Array(currentQ.statements.length).fill(null) : [];
      userShortAns = ""; 
      renderApp();
    }

    function checkAnswer() {
      isCurrentCorrect = false;
      if (currentQ.type === 'multiple_choice') {
        isCurrentCorrect = (userMcqAns === currentQ.correct_answer);
      } else if (currentQ.type === 'true_false') {
        isCurrentCorrect = userTfAns.every((ans, idx) => ans === currentQ.statements[idx].is_true);
      } else if (currentQ.type === 'short_answer') {
        const normalize = (str) => str.toString().trim().toLowerCase().replace(',', '.'); 
        isCurrentCorrect = (normalize(userShortAns) === normalize(currentQ.correct_answer).replace(',', '.'));
      }
      
      feedbackMode = true;
      renderApp();
    }

    function nextStep() {
      const currentId = queue.shift(); 
      if (!isCurrentCorrect) { queue.push(currentId); stats.wrong++; }
      loadNextQuestion();
    }

    function selectMcq(idx) { if(feedbackMode) return; userMcqAns = idx; renderApp(); }
    function selectTf(stmtIdx, boolVal) { if(feedbackMode) return; userTfAns[stmtIdx] = boolVal; renderApp(); }
    function inputShortAns(val) { userShortAns = val; renderApp(); } 

    // ================= GIAO DIỆN RENDER HTML =================
    function renderApp() {
      const app = document.getElementById('app');
      const progressRatio = ((totalQuestions - queue.length) / totalQuestions) * 100;
      
      const progressHtml = `
        <div class="mb-6 bg-white p-4 rounded-2xl shadow-sm border border-indigo-100">
          <div class="flex justify-between text-sm font-bold text-indigo-800 mb-2">
            <span>Tiến độ hoàn thành môn Vật Lý</span>
            <span>${totalQuestions - queue.length + 1} / ${totalQuestions}</span>
          </div>
          <div class="w-full bg-indigo-100 rounded-full h-3">
            <div class="bg-indigo-600 h-3 rounded-full transition-all duration-500" style="width: ${progressRatio}%"></div>
          </div>
          ${queue.length > totalQuestions ? '<p class="text-xs text-red-500 mt-2 font-medium">Đang khắc phục các câu tính toán sai...</p>' : ''}
        </div>
      `;

      let questionHtml = `<div class="bg-white rounded-2xl shadow-md p-6 mb-6 border border-indigo-50">
        <h2 class="text-lg font-bold text-gray-800 mb-4 whitespace-pre-line leading-relaxed">${currentQ.question}</h2>`;

      // Cảnh báo nếu bạn chưa tạo file ảnh
      if (currentQ.image) {
        questionHtml += `
          <div class="mb-6 flex justify-center bg-gray-50 p-2 rounded-xl border border-dashed border-gray-300">
            <img src="${currentQ.image}" alt="Hình ảnh công thức/đồ thị" class="max-w-full h-auto rounded-lg" onerror="this.onerror=null; this.parentElement.innerHTML='<p class=\\'text-red-500 text-sm font-bold\\'>⚠️ Bạn chưa lưu file ảnh: ' + this.src.split('/').pop() + ' vào thư mục img</p>';">
          </div>
        `;
      }

      if (currentQ.type === 'multiple_choice') {
        questionHtml += `<div class="space-y-3">`;
        currentQ.options.forEach((opt, idx) => {
          let btnClass = "w-full text-left p-4 rounded-xl border-2 border-gray-200 hover:border-indigo-400 transition-all font-medium text-gray-700";
          if (userMcqAns === idx) btnClass = "w-full text-left p-4 rounded-xl border-2 border-indigo-500 bg-indigo-50 font-bold text-indigo-900";
          if (feedbackMode) {
            if (idx === currentQ.correct_answer) btnClass += " correct-ans";
            else if (userMcqAns === idx && !isCurrentCorrect) btnClass += " wrong-ans";
          }
          questionHtml += `<button onclick="selectMcq(${idx})" class="${btnClass}" ${feedbackMode ? 'disabled' : ''}>${opt}</button>`;
        });
        questionHtml += `</div>`;
      }

      if (currentQ.type === 'true_false') {
        questionHtml += `<div class="space-y-4">`;
        currentQ.statements.forEach((stmt, idx) => {
          const isStmtCorrect = (userTfAns[idx] === stmt.is_true);
          let btnTrueClass = userTfAns[idx] === true ? "tf-selected" : "bg-white text-gray-600 border-gray-300 hover:bg-gray-50";
          let btnFalseClass = userTfAns[idx] === false ? "tf-selected" : "bg-white text-gray-600 border-gray-300 hover:bg-gray-50";
          let rowFeedback = '';
          let rowBorder = 'border-gray-200';

          if (feedbackMode) {
            if (isStmtCorrect) {
              rowBorder = 'border-green-400 bg-green-50';
              rowFeedback = `<div class="text-sm font-bold text-green-600 mt-2 sm:mt-0">✅ Phân tích đúng</div>`;
            } else {
              rowBorder = 'border-red-400 bg-red-50';
              rowFeedback = `<div class="text-sm font-bold text-red-600 mt-2 sm:mt-0">❌ Sai (Đáp án: ${stmt.is_true ? 'Đúng' : 'Sai'})</div>`;
            }
          }

          questionHtml += `
            <div class="flex flex-col sm:flex-row sm:items-center justify-between p-4 border-2 ${rowBorder} rounded-xl gap-4 transition-all">
              <span class="flex-1 text-gray-800 font-medium">${stmt.text}</span>
              <div class="flex gap-2 shrink-0">
                <button onclick="selectTf(${idx}, true)" class="px-4 py-2 rounded-lg font-bold border-2 transition-all ${btnTrueClass}" ${feedbackMode ? 'disabled' : ''}>Đúng</button>
                <button onclick="selectTf(${idx}, false)" class="px-4 py-2 rounded-lg font-bold border-2 transition-all ${btnFalseClass}" ${feedbackMode ? 'disabled' : ''}>Sai</button>
              </div>
              ${rowFeedback}
            </div>
          `;
        });
        questionHtml += `</div>`;
      }

      if (currentQ.type === 'short_answer') {
        questionHtml += `
          <div>
            <input type="text" oninput="inputShortAns(this.value)" value="${userShortAns}" placeholder="Nhập kết quả tính toán..." 
            class="w-full p-4 border-2 border-gray-300 rounded-xl focus:border-indigo-500 focus:outline-none transition-all text-lg font-bold text-gray-800" ${feedbackMode ? 'disabled' : ''}>
            ${feedbackMode && !isCurrentCorrect ? `<p class="mt-3 text-red-600 font-bold bg-red-50 p-3 rounded-lg border border-red-200 shadow-inner">Đáp án chính xác: ${currentQ.correct_answer}</p>` : ''}
          </div>
        `;
      }

      questionHtml += `</div>`;

      let actionHtml = '';
      if (!feedbackMode) {
        let ready = (currentQ.type === 'multiple_choice' && userMcqAns !== null) || 
                    (currentQ.type === 'true_false' && !userTfAns.includes(null)) ||
                    (currentQ.type === 'short_answer' && userShortAns.trim() !== "");
                    
        actionHtml = `<button onclick="checkAnswer()" ${!ready ? 'disabled' : ''} class="w-full ${ready ? 'bg-indigo-600 hover:bg-indigo-700 shadow-md shadow-indigo-200' : 'bg-gray-300 cursor-not-allowed'} text-white font-bold py-4 rounded-xl text-lg transition-all tracking-wide">Kiểm tra kết quả</button>`;
      } else {
        const fbText = isCurrentCorrect ? '✅ Hoàn toàn chính xác!' : '❌ Tính toán sai! Câu này sẽ được lưu lại ở cuối.';
        actionHtml = `
          <div class="p-4 rounded-xl border-2 flex items-center justify-between ${isCurrentCorrect ? 'bg-green-50 border-green-500 text-green-700' : 'bg-red-50 border-red-500 text-red-700'} shadow-sm">
            <span class="font-bold text-lg">${fbText}</span>
            <button onclick="nextStep()" class="px-8 py-3 font-bold rounded-lg text-white shadow-md ${isCurrentCorrect ? 'bg-green-600 hover:bg-green-700' : 'bg-red-600 hover:bg-red-700'} transition-all">Tiếp tục</button>
          </div>
        `;
      }
      app.innerHTML = progressHtml + questionHtml + actionHtml;
    }

    function renderFinishScreen() {
      document.getElementById('app').innerHTML = `
        <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center mx-auto mt-10 border border-indigo-100">
          <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <span class="text-4xl">🏆</span>
          </div>
          <h1 class="text-3xl font-black text-indigo-700 mb-4">Hoàn Thành Bài Tập!</h1>
          <p class="text-gray-600 mb-6 font-medium">Bạn đã vượt qua toàn bộ 71 câu hỏi Lý. Quá xuất sắc!</p>
          <div class="bg-indigo-50 rounded-xl p-5 mb-8 border border-indigo-100">
            <p class="text-lg font-bold text-gray-700 flex justify-between">Tổng số lần giải sai: <span class="text-red-600 text-2xl">${stats.wrong}</span></p>
          </div>
          <button onclick="initApp()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-4 rounded-xl transition-all shadow-lg shadow-indigo-200 tracking-wider">
            Làm lại từ đầu
          </button>
        </div>
      `;
    }

    window.onload = initApp;
  </script>
