<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phiếu Trả Lời Điện Tử - Vật Lý 12</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* CSS cho các nút bấm giống phiếu trắc nghiệm */
    .mcq-btn { transition: all 0.2s ease; }
    .mcq-selected { background-color: #4f46e5 !important; color: white !important; border-color: #4f46e5 !important; transform: scale(1.05); }
    .tf-selected { background-color: #4f46e5 !important; color: white !important; border-color: #4f46e5 !important; }
    
    .correct-ans { background-color: #22c55e !important; color: white !important; border-color: #22c55e !important; }
    .wrong-ans { background-color: #ef4444 !important; color: white !important; border-color: #ef4444 !important; }
    
    .correct-row { border-color: #4ade80 !important; background-color: #f0fdf4 !important; }
    .wrong-row { border-color: #f87171 !important; background-color: #fef2f2 !important; }
  </style>
</head>
<body class="bg-indigo-50 min-h-screen flex flex-col items-center py-10 px-4 font-sans text-gray-800">

  <div id="app" class="max-w-xl w-full">
    </div>

  <script>
    // ================= TỰ ĐỘNG TẠO DỮ LIỆU ĐỀ THI =================
    // Thay vì gõ tay từng câu, tôi dùng mảng đáp án để tạo ra 71 câu hỏi siêu nhanh
    const examData = [];

    // 1. PHẦN I: 45 CÂU TRẮC NGHIỆM
    // Đáp án: A=0, B=1, C=2, D=3
    const mcqAns = [2, 1, 2, 3, 3, 0, 1, 0, 0, 1, 2, 1, 0, 0, 2, 1, 2, 2, 2, 3, 2, 0, 0, 0, 3, 0, 1, 0, 0, 1, 2, 1, 2, 2, 1, 0, 2, 3, 3, 1, 2, 3, 3, 3, 1];
    for(let i=0; i<45; i++) {
        examData.push({
            id: "mcq_" + (i+1),
            type: "multiple_choice",
            question: "PHẦN I - CÂU " + (i+1),
            options: ["A", "B", "C", "D"],
            correct_answer: mcqAns[i]
        });
    }

    // 2. PHẦN II: 10 CÂU ĐÚNG/SAI
    const tfAns = [
        [false, false, true, false], // Câu 1
        [true, false, true, false],  // Câu 2
        [true, true, false, false],  // Câu 3
        [false, true, false, true],  // Câu 4
        [false, false, true, false], // Câu 5
        [false, true, false, false], // Câu 6
        [true, false, false, true],  // Câu 7
        [false, false, true, false], // Câu 8
        [true, false, true, false],  // Câu 9
        [true, true, false, false]   // Câu 10
    ];
    for(let i=0; i<10; i++) {
        examData.push({
            id: "tf_" + (i+1),
            type: "true_false",
            question: "PHẦN II - CÂU " + (i+1) + " (Đúng/Sai)",
            statements: [
                { text: "Ý a", is_true: tfAns[i][0] },
                { text: "Ý b", is_true: tfAns[i][1] },
                { text: "Ý c", is_true: tfAns[i][2] },
                { text: "Ý d", is_true: tfAns[i][3] }
            ]
        });
    }

    // 3. PHẦN III: 16 CÂU TRẢ LỜI NGẮN
    const saAns = [
      // 16 câu của đề 1
      "60", "-0,1", "0,25", "40,2", "64", "1,96", "69", "30", "66", "6,9", "0,28", "20", "3,54", "0,05", "1495", "3,8",
      // 25 ý của đề 2 (gồm các câu a, b)
      "0,02", "34,7", "15,6", "800", "77,5", "405", "5,6", "8", "1,15", "0,09", "0,11", "6", "784", "3,58", "175", "206", "0,15", "1,6", "1,6", "600", "40", "14", "0,96", "2,2", "2"
    ];
    for(let i=0; i<41; i++) {
        examData.push({
            id: "sa_" + (i+1),
            type: "short_answer",
            question: "PHẦN III - CÂU " + (i+1) + " (Trả lời ngắn)",
            correct_answer: saAns[i]
        });
    }

    // ================= LOGIC ĐIỀU HƯỚNG =================
    let queue = [];
    let totalQuestions = 0;
    let stats = { wrong: 0 };
    let currentQ = null;
    let feedbackMode = false;
    let isCurrentCorrect = false;

    let userMcqAns = null;
    let userTfAns = [];
    let userShortAns = "";

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function initApp() {
      let initialQueue = examData.map(q => q.id);
      queue = shuffleArray(initialQueue);
      totalQuestions = examData.length;
      stats.wrong = 0;
      loadNextQuestion();
    }

    function loadNextQuestion() {
      if (queue.length === 0) { renderFinishScreen(); return; }
      const currentId = queue[0];
      currentQ = examData.find(q => q.id === currentId);
      feedbackMode = false;
      userMcqAns = null;
      userTfAns = currentQ.type === 'true_false' ? new Array(currentQ.statements.length).fill(null) : [];
      userShortAns = ""; 
      renderApp();
    }

    function checkAnswer() {
      isCurrentCorrect = false;
      if (currentQ.type === 'multiple_choice') {
        isCurrentCorrect = (userMcqAns === currentQ.correct_answer);
      } else if (currentQ.type === 'true_false') {
        isCurrentCorrect = userTfAns.every((ans, idx) => ans === currentQ.statements[idx].is_true);
      } else if (currentQ.type === 'short_answer') {
        const normalize = (str) => str.toString().trim().toLowerCase().replace(',', '.'); 
        isCurrentCorrect = (normalize(userShortAns) === normalize(currentQ.correct_answer).replace(',', '.'));
      }
      
      feedbackMode = true;
      renderApp();
    }

    function nextStep() {
      const currentId = queue.shift(); 
      if (!isCurrentCorrect) { queue.push(currentId); stats.wrong++; }
      loadNextQuestion();
    }

    function selectMcq(idx) { if(feedbackMode) return; userMcqAns = idx; renderApp(); }
    function selectTf(stmtIdx, boolVal) { if(feedbackMode) return; userTfAns[stmtIdx] = boolVal; renderApp(); }
    function inputShortAns(val) { userShortAns = val; renderApp(); } 

    // ================= GIAO DIỆN PHIẾU TRẢ LỜI =================
    function renderApp() {
      const app = document.getElementById('app');
      const progressRatio = ((totalQuestions - queue.length) / totalQuestions) * 100;
      
      const progressHtml = `
        <div class="mb-6 bg-white p-4 rounded-2xl shadow-sm border border-indigo-100 text-center">
          <div class="text-sm font-bold text-indigo-400 mb-1 tracking-widest uppercase">Tiến độ làm bài</div>
          <div class="text-2xl font-black text-indigo-900 mb-3">${totalQuestions - queue.length + 1} / ${totalQuestions}</div>
          <div class="w-full bg-indigo-100 rounded-full h-2">
            <div class="bg-indigo-600 h-2 rounded-full transition-all duration-500" style="width: ${progressRatio}%"></div>
          </div>
          ${queue.length > totalQuestions ? '<p class="text-xs text-red-500 mt-2 font-bold animate-pulse">Làm lại các câu sai...</p>' : ''}
        </div>
      `;

      let questionHtml = `<div class="bg-white rounded-3xl shadow-lg p-8 mb-6 border-b-4 border-indigo-500">
        <h2 class="text-3xl font-black text-center text-gray-800 mb-8 tracking-tight">${currentQ.question}</h2>`;

      // GIAO DIỆN TRẮC NGHIỆM (Nút bấm tròn ngang)
      if (currentQ.type === 'multiple_choice') {
        questionHtml += `<div class="flex justify-center gap-4 sm:gap-6">`;
        currentQ.options.forEach((opt, idx) => {
          let btnClass = "mcq-btn w-16 h-16 sm:w-20 sm:h-20 flex items-center justify-center rounded-full border-4 border-gray-200 text-2xl font-black text-gray-400 hover:border-indigo-300 hover:text-indigo-400 bg-white cursor-pointer shadow-sm";
          
          if (userMcqAns === idx) btnClass = "mcq-btn w-16 h-16 sm:w-20 sm:h-20 flex items-center justify-center rounded-full border-4 mcq-selected text-2xl font-black shadow-md";
          
          if (feedbackMode) {
            if (idx === currentQ.correct_answer) {
              btnClass = "mcq-btn w-16 h-16 sm:w-20 sm:h-20 flex items-center justify-center rounded-full border-4 correct-ans text-2xl font-black shadow-md";
            } else if (userMcqAns === idx && !isCurrentCorrect) {
              btnClass = "mcq-btn w-16 h-16 sm:w-20 sm:h-20 flex items-center justify-center rounded-full border-4 wrong-ans text-2xl font-black shadow-md";
            }
          }
          questionHtml += `<button onclick="selectMcq(${idx})" class="${btnClass}" ${feedbackMode ? 'disabled' : ''}>${opt}</button>`;
        });
        questionHtml += `</div>`;
      }

      // GIAO DIỆN ĐÚNG/SAI
      if (currentQ.type === 'true_false') {
        questionHtml += `<div class="space-y-4">`;
        currentQ.statements.forEach((stmt, idx) => {
          const isStmtCorrect = (userTfAns[idx] === stmt.is_true);
          let btnTrueClass = userTfAns[idx] === true ? "tf-selected" : "bg-gray-100 text-gray-500 border-gray-200 hover:bg-gray-200";
          let btnFalseClass = userTfAns[idx] === false ? "tf-selected" : "bg-gray-100 text-gray-500 border-gray-200 hover:bg-gray-200";
          let rowFeedback = '';
          let rowBorder = 'border-gray-100';

          if (feedbackMode) {
            if (isStmtCorrect) {
              rowBorder = 'correct-row';
              rowFeedback = `<span class="ml-3 text-xl">✅</span>`;
            } else {
              rowBorder = 'wrong-row';
              rowFeedback = `<span class="ml-3 text-xl">❌ <span class="text-sm font-bold text-red-500">(${stmt.is_true ? 'Đúng' : 'Sai'})</span></span>`;
            }
          }

          questionHtml += `
            <div class="flex items-center justify-between p-4 border-2 ${rowBorder} rounded-2xl transition-all">
              <span class="text-2xl font-black text-gray-700 w-16">${stmt.text}</span>
              <div class="flex gap-3 shrink-0">
                <button onclick="selectTf(${idx}, true)" class="w-20 py-3 rounded-xl font-bold border-2 transition-all text-lg ${btnTrueClass}" ${feedbackMode ? 'disabled' : ''}>Đúng</button>
                <button onclick="selectTf(${idx}, false)" class="w-20 py-3 rounded-xl font-bold border-2 transition-all text-lg ${btnFalseClass}" ${feedbackMode ? 'disabled' : ''}>Sai</button>
              </div>
              <div class="w-16 flex justify-end">${rowFeedback}</div>
            </div>
          `;
        });
        questionHtml += `</div>`;
      }

      // GIAO DIỆN TRẢ LỜI NGẮN
      if (currentQ.type === 'short_answer') {
        questionHtml += `
          <div class="mt-4">
            <input type="text" oninput="inputShortAns(this.value)" value="${userShortAns}" placeholder="Nhập đáp án..." 
            class="w-full p-6 border-4 border-gray-200 rounded-2xl focus:border-indigo-500 focus:outline-none transition-all text-3xl font-black text-center text-indigo-900" ${feedbackMode ? 'disabled' : ''}>
            ${feedbackMode && !isCurrentCorrect ? `<p class="mt-4 text-center text-red-600 font-bold bg-red-50 p-4 rounded-xl border-2 border-red-200">Đáp án chính xác: <span class="text-2xl">${currentQ.correct_answer}</span></p>` : ''}
          </div>
        `;
      }

      questionHtml += `</div>`;

      // NÚT KIỂM TRA
      let actionHtml = '';
      if (!feedbackMode) {
        let ready = (currentQ.type === 'multiple_choice' && userMcqAns !== null) || 
                    (currentQ.type === 'true_false' && !userTfAns.includes(null)) ||
                    (currentQ.type === 'short_answer' && userShortAns.trim() !== "");
                    
        actionHtml = `<button onclick="checkAnswer()" ${!ready ? 'disabled' : ''} class="w-full ${ready ? 'bg-indigo-600 hover:bg-indigo-700 shadow-xl shadow-indigo-200 translate-y-0' : 'bg-gray-200 text-gray-400 cursor-not-allowed'} text-white font-black py-5 rounded-2xl text-xl transition-all uppercase tracking-widest">Chốt Đáp Án</button>`;
      } else {
        const fbText = isCurrentCorrect ? '✅ CHÍNH XÁC!' : '❌ SAI RỒI!';
        actionHtml = `
          <div class="p-2 rounded-2xl border-2 flex items-center justify-between ${isCurrentCorrect ? 'bg-green-50 border-green-500 text-green-700' : 'bg-red-50 border-red-500 text-red-700'} shadow-sm">
            <span class="font-black text-2xl pl-4">${fbText}</span>
            <button onclick="nextStep()" class="px-10 py-4 font-black rounded-xl text-white shadow-md ${isCurrentCorrect ? 'bg-green-600 hover:bg-green-700' : 'bg-red-600 hover:bg-red-700'} transition-all text-xl uppercase tracking-widest">Tiếp tục ⏭</button>
          </div>
        `;
      }
      app.innerHTML = progressHtml + questionHtml + actionHtml;
    }

    function renderFinishScreen() {
      document.getElementById('app').innerHTML = `
        <div class="bg-white p-10 rounded-3xl shadow-2xl max-w-md w-full text-center mx-auto mt-10 border-t-8 border-indigo-600">
          <div class="text-6xl mb-6">🏆</div>
          <h1 class="text-4xl font-black text-indigo-900 mb-4 uppercase tracking-tighter">Hoàn Thành!</h1>
          <p class="text-gray-500 mb-8 font-medium text-lg">Bạn đã cày nát toàn bộ 71 câu Vật Lý.</p>
          <div class="bg-gray-50 rounded-2xl p-6 mb-8 border border-gray-100">
            <p class="text-gray-500 font-bold uppercase tracking-widest text-sm mb-2">Số lần sai cần khắc phục</p>
            <p class="text-red-500 font-black text-5xl">${stats.wrong}</p>
          </div>
          <button onclick="initApp()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-5 px-4 rounded-2xl transition-all shadow-xl shadow-indigo-200 uppercase tracking-widest text-xl">
            Làm lại từ đầu
          </button>
        </div>
      `;
    }

    window.onload = initApp;
  </script>
</body>
</html>
